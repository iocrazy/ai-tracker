<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="nodeGradMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="nodeGradTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="48%" r="35%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#22c55e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Subtle background pattern - very faint grid -->
  <g opacity="0.03" stroke="#22c55e" stroke-width="1">
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
  </g>

  <!-- Central glow -->
  <circle cx="512" cy="490" r="300" fill="url(#coreGlow)"/>

  <!-- Connection lines - outer to inner (drawn first, behind nodes) -->
  <g stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" opacity="0.2">
    <!-- Top outer nodes to inner -->
    <line x1="300" y1="200" x2="380" y2="320"/>
    <line x1="512" y1="150" x2="512" y2="290"/>
    <line x1="724" y1="200" x2="644" y2="320"/>
    <!-- Side outer nodes to inner -->
    <line x1="180" y1="490" x2="310" y2="490"/>
    <line x1="844" y1="490" x2="714" y2="490"/>
    <!-- Bottom outer nodes to inner -->
    <line x1="300" y1="780" x2="380" y2="660"/>
    <line x1="512" y1="830" x2="512" y2="690"/>
    <line x1="724" y1="780" x2="644" y2="660"/>
  </g>

  <!-- Connection lines - inner to center -->
  <g stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" opacity="0.4">
    <line x1="380" y1="320" x2="512" y2="490"/>
    <line x1="512" y1="290" x2="512" y2="490"/>
    <line x1="644" y1="320" x2="512" y2="490"/>
    <line x1="310" y1="490" x2="512" y2="490"/>
    <line x1="714" y1="490" x2="512" y2="490"/>
    <line x1="380" y1="660" x2="512" y2="490"/>
    <line x1="512" y1="690" x2="512" y2="490"/>
    <line x1="644" y1="660" x2="512" y2="490"/>
  </g>

  <!-- Cross-connections between inner nodes -->
  <g stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" opacity="0.15">
    <line x1="380" y1="320" x2="644" y2="320"/>
    <line x1="380" y1="320" x2="310" y2="490"/>
    <line x1="644" y1="320" x2="714" y2="490"/>
    <line x1="310" y1="490" x2="380" y2="660"/>
    <line x1="714" y1="490" x2="644" y2="660"/>
    <line x1="380" y1="660" x2="644" y2="660"/>
  </g>

  <!-- Outer nodes (ring 2) - smaller, dimmer -->
  <g filter="url(#softGlow)">
    <circle cx="300" cy="200" r="12" fill="#22c55e" opacity="0.5"/>
    <circle cx="512" cy="150" r="13" fill="#2dd4bf" opacity="0.5"/>
    <circle cx="724" cy="200" r="12" fill="#22c55e" opacity="0.5"/>
    <circle cx="180" cy="490" r="11" fill="#2dd4bf" opacity="0.4"/>
    <circle cx="844" cy="490" r="11" fill="#2dd4bf" opacity="0.4"/>
    <circle cx="300" cy="780" r="12" fill="#22c55e" opacity="0.5"/>
    <circle cx="512" cy="830" r="13" fill="#2dd4bf" opacity="0.5"/>
    <circle cx="724" cy="780" r="12" fill="#22c55e" opacity="0.5"/>
  </g>

  <!-- Inner nodes (ring 1) - prominent -->
  <g filter="url(#softGlow)">
    <!-- Top row -->
    <circle cx="380" cy="320" r="24" fill="#4ade80"/>
    <circle cx="512" cy="290" r="26" fill="#2dd4bf"/>
    <circle cx="644" cy="320" r="24" fill="#4ade80"/>
    <!-- Middle row -->
    <circle cx="310" cy="490" r="22" fill="#22c55e"/>
    <circle cx="714" cy="490" r="22" fill="#22c55e"/>
    <!-- Bottom row -->
    <circle cx="380" cy="660" r="24" fill="#4ade80"/>
    <circle cx="512" cy="690" r="26" fill="#2dd4bf"/>
    <circle cx="644" cy="660" r="24" fill="#4ade80"/>
  </g>

  <!-- Center node (core AI) - largest, brightest -->
  <g filter="url(#glow)">
    <circle cx="512" cy="490" r="56" fill="url(#coreInner)"/>
  </g>
  <circle cx="512" cy="490" r="32" fill="#0f172a"/>
  <circle cx="512" cy="490" r="18" fill="#4ade80"/>
  <circle cx="512" cy="490" r="8" fill="#0f172a"/>
</svg>
