<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <!-- Simplified neural network for menu bar: center node + 4 connections + 4 outer nodes -->
  <!-- Uses black fill for macOS template icon (system auto-inverts for dark mode) -->

  <!-- Connection lines -->
  <g stroke="#000" stroke-width="1.2" stroke-linecap="round">
    <line x1="11" y1="11" x2="4" y2="4"/>
    <line x1="11" y1="11" x2="18" y2="4"/>
    <line x1="11" y1="11" x2="4" y2="18"/>
    <line x1="11" y1="11" x2="18" y2="18"/>
    <line x1="11" y1="11" x2="11" y2="3"/>
    <line x1="11" y1="11" x2="11" y2="19"/>
  </g>

  <!-- Outer nodes -->
  <circle cx="4" cy="4" r="2" fill="#000"/>
  <circle cx="18" cy="4" r="2" fill="#000"/>
  <circle cx="4" cy="18" r="2" fill="#000"/>
  <circle cx="18" cy="18" r="2" fill="#000"/>
  <circle cx="11" cy="3" r="1.8" fill="#000"/>
  <circle cx="11" cy="19" r="1.8" fill="#000"/>

  <!-- Center node (larger) -->
  <circle cx="11" cy="11" r="3.2" fill="#000"/>
  <circle cx="11" cy="11" r="1.5" fill="#fff"/>
</svg>
