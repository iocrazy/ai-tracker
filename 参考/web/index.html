<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RetroOps Control Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #050505;
        color: #4ade80;
        font-family: 'VT323', monospace;
        overflow-x: hidden; /* Allow vertical scroll, prevent horizontal */
        min-height: 100vh;
      }
      
      /* CRT Scroll Animation */
      @keyframes scanline {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: 0 100%;
        }
      }

      /* Text Flicker */
      @keyframes flicker {
        0% { opacity: 0.97; }
        5% { opacity: 0.95; }
        10% { opacity: 0.9; }
        15% { opacity: 0.95; }
        20% { opacity: 0.99; }
        50% { opacity: 0.95; }
        55% { opacity: 0.9; }
        60% { opacity: 0.99; }
        75% { opacity: 0.96; }
        100% { opacity: 0.98; }
      }

      .crt-flicker {
        animation: flicker 0.15s infinite;
      }

      .scanlines {
        background: linear-gradient(
          to bottom,
          rgba(255,255,255,0),
          rgba(255,255,255,0) 50%,
          rgba(0,0,0,0.2) 50%,
          rgba(0,0,0,0.2)
        );
        background-size: 100% 4px;
        animation: scanline 10s linear infinite;
        pointer-events: none;
      }

      /* NOISE EFFECT */
      @keyframes noise {
        0% { transform: translate(0,0) }
        10% { transform: translate(-5%,-5%) }
        20% { transform: translate(-10%,5%) }
        30% { transform: translate(5%,-10%) }
        40% { transform: translate(-5%,15%) }
        50% { transform: translate(-10%,5%) }
        60% { transform: translate(15%,0) }
        70% { transform: translate(0,10%) }
        80% { transform: translate(-15%,0) }
        90% { transform: translate(10%,5%) }
        100% { transform: translate(5%,0) }
      }
      
      .noise-overlay {
        position: fixed;
        top: -50%;
        left: -50%;
        right: -50%;
        bottom: -50%;
        width: 200%;
        height: 200vh;
        background: transparent url('http://assets.iceable.com/img/noise-transparent.png') repeat 0 0;
        background-repeat: repeat;
        animation: noise .2s infinite;
        opacity: .05;
        visibility: visible;
        pointer-events: none;
        z-index: 40;
      }

      /* RGB SHIFT */
      .rgb-shifted {
        text-shadow: 2px 0 rgba(255,0,0,0.5), -2px 0 rgba(0,255,255,0.5);
      }

      /* PERSPECTIVE GRID */
      .perspective-grid {
        background: 
          linear-gradient(transparent 0%, rgba(34, 197, 94, 0.1) 2px, transparent 3px),
          linear-gradient(90deg, transparent 0%, rgba(34, 197, 94, 0.1) 2px, transparent 3px);
        background-size: 50px 50px;
        transform: perspective(500px) rotateX(20deg) scale(2);
        transform-origin: top center;
        opacity: 0.2;
        pointer-events: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 12px;
        background: #111;
      }
      ::-webkit-scrollbar-thumb {
        background: #225533;
        border: 1px solid #4ade80;
      }
      
      .retro-border {
        box-shadow: 0 0 10px rgba(74, 222, 128, 0.4), inset 0 0 20px rgba(74, 222, 128, 0.1);
        border: 2px solid #4ade80;
      }

      .retro-text-shadow {
        text-shadow: 0 0 5px rgba(74, 222, 128, 0.7), 0 0 10px rgba(74, 222, 128, 0.5);
      }
      
      .retro-text-shadow-strong {
        text-shadow: 0 0 10px rgba(74, 222, 128, 0.9), 0 0 20px rgba(74, 222, 128, 0.6);
      }
      
      .retro-text-shadow-alert {
        text-shadow: 0 0 5px rgba(239, 68, 68, 0.7), 0 0 10px rgba(239, 68, 68, 0.5);
      }
    </style>

{
